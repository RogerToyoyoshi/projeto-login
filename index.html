<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Faça login para acessar sua conta.</p>
                
                <form action="login.php" method="post">
                    <p class="campo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="text" name="usuario" id="iusuario" required placeholder="E-mail ou usuário">
                        <label for="iusuario">Usuário: </label>
                    </p>
                    <p class="campo">
                        <span class="material-symbols-outlined">key</span>
                        <input type="password" name="senha" id="isenha" required placeholder="Senha">
                        <label for="isenha">Senha: </label>
                    </p>
                    <p>
                        <input type="submit" class="botao" value="Login">
                    </p>
                    <p>
                        <a href="recuperar-senha.html" class="botao">Esqueci a senha</a>
                    </p>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
